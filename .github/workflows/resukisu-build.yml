name: Build kernel (ReSukiSU, KPM Patched)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4 

      - name: Set up the toolchain
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            bc bison build-essential curl flex \
            g++-multilib gcc-multilib git gnupg \
            lib32readline-dev lib32z1-dev \
            libelf-dev liblz4-tool libssl-dev \
            lzop zlib1g-dev pahole dwarves cpio zip \
            python3 python-is-python3 tar perl lz4 jq
          # The AOSP Clang version currently in use is r574158
          curl -sSfL --retry 3 --connect-timeout 10 \
            -o clang.tar.gz \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/mirror-goog-main-llvm-toolchain-source/clang-r574158.tar.gz" || \
            { echo "ERROR: Failed to download AOSP Clang! Aborting."; exit 1; }
          mkdir clang-toolchain
          tar -xf clang.tar.gz -C clang-toolchain
          rm clang.tar.gz


      - name: Clone source
        run: |
          git clone --depth=1 -b android13-5.15 https://github.com/gyabii/kernel_samsung_sm8550-common.git kernel

          # Determine the current kernel version
          echo "KERNEL_VERSION=$(grep -m1 '^SUBLEVEL =' ./kernel/Makefile | awk '{print $3}')" >> $GITHUB_ENV
          
      - name: Apply ReSukiSU
        run: |
          set -euxo pipefail
          cd kernel
          
          # Integrate the main ReSukiSU 
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash -s main

          # Determine the tag of the latest release of ReSukiSU
          echo "RESUKISU_VERSION=$(curl -s "https://api.github.com/repos/ReSukiSU/ReSukiSU/tags" \
          | jq -r '.[0].name' | sed 's/^v//' | tr -d '.')" >> $GITHUB_ENV
                    
          # Compute version code = commit count + 10200 (same scheme as KernelSU CI)
          COMMITS="$(git -C "./KernelSU" rev-list --count HEAD || echo 0)"
          RESUKISU_VER_CODE=$((40000 + COMMITS - 2815))
          echo "RESUKISU_VER_CODE=$RESUKISU_VER_CODE" >> "$GITHUB_ENV"

          CONFIG_FILE="arch/arm64/configs/vendor/ksu_defconfig"
          
          # ReSukiSU KPM
          echo "CONFIG_KPM=y" >> "$CONFIG_FILE"
          sed -i '/config KPM/{:a; n; s/^\s*default n/default y/; ta;}' KernelSU/kernel/Kconfig
          

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16

      - name: Build the kernel
        run: |
          cd kernel
          # Add AOSP Clang to local PATH
          export PATH="$GITHUB_WORKSPACE/clang-toolchain/bin:$PATH"
          # Get the current date
          echo "DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
          # Generate configuration
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang LD=ld.lld LLVM=1 LLVM_IAS=1 gki_defconfig vendor/ksu_defconfig || exit 1
          # Run make
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang LD=ld.lld LLVM=1 LLVM_IAS=1 || exit 1
      
      - name: KPM Patching
        run: |
          cd kernel/out/arch/arm64/boot/
          curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU_patch/refs/heads/main/kpm/patch_linux" -o patch
          chmod 777 patch
          ./patch
          rm -rf Image Image.gz
          mv oImage Image
          gzip -k -9 -n Image
          cd ../../../../..    


      - name: Package image with AnyKernel3
        id: package
        run: |
          set -euxo pipefail
          unzip "${GITHUB_WORKSPACE}/anykernel.zip" -d anykernel/
          cp kernel/out/arch/arm64/boot/Image.gz anykernel/
          # Build final name
          ZIP_NAME="common-5.15.${KERNEL_VERSION}-gyabii-resukisu${RESUKISU_VERSION}-${RESUKISU_VER_CODE}_KPM-${{ env.DATE }}"
          cd anykernel
          zip -r0 ../"${ZIP_NAME}".zip ./*
          echo "zip_path=$GITHUB_WORKSPACE/${ZIP_NAME}.zip" >> "$GITHUB_OUTPUT"
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          cd ..

      - name: Upload the flashable kernel
        uses: actions/upload-artifact@v4
        with:
          name: ${{steps.package.outputs.zip_name}}
          path: anykernel/
      
      - name: Create GitHub Release and upload asset
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: resukisu_build-${{ github.run_id }} 
          target_commitish: ${{ github.sha }}
          name: "ReSukiSU Kernel Build by ${{ github.repository }}"
          generate_release_notes: true
          files: ${{ steps.package.outputs.zip_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   
