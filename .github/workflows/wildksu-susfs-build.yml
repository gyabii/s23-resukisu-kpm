# build.yml kanged from Rezoss Reza modified to build kernel with WildKSU-stable
name: Build kernel (Wild KSU, SuSFS Manual Hooks)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4 

      - name: Set up the toolchain
        run: |
          sudo apt update
          sudo apt install -y \
            bc bison build-essential curl flex \
            g++-multilib gcc-multilib git gnupg \
            lib32readline-dev lib32z1-dev \
            libelf-dev liblz4-tool libssl-dev \
            lzop zlib1g-dev pahole dwarves cpio zip \
            python3 python-is-python3 tar perl lz4 jq

      - name: Clone source
        run: |
          git clone --depth=1 -b android13-5.15 https://github.com/gyabii/kernel_samsung_sm8550-common.git kernel

          # Determine the current kernel version
          echo "KERNEL_VERSION=$(grep -m1 '^SUBLEVEL =' ./kernel/Makefile | awk '{print $3}')" >> $GITHUB_ENV
          
      - name: Apply Wild KSU and SuSFS
        run: |
          set -euxo pipefail
          cd kernel
          
          # Integrate the main Wild KSU 
          curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/wild/kernel/setup.sh" | bash -s stable

          # Determine the tag of the latest release of Wild KSU
          echo "WILDKSU_VERSION=$(curl -s "https://api.github.com/repos/WildKernels/Wild_KSU/tags" \
          | jq -r '.[0].name' | sed 's/^v//' | tr -d '.')" >> $GITHUB_ENV
          
          COMMITS="$(git -C "./Wild_KSU" rev-list --count HEAD || echo 0)"
          WILDKSU_VER_CODE=$((30000 + COMMITS))
          echo "WILDKSU_VER_CODE=$WILDKSU_VER_CODE" >> "$GITHUB_ENV"
          
          # Clone SUSFS4KSU for kernel patches only (not KSU integration)
          echo "Cloning SUSFS4KSU for kernel patches..."
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android13-5.15
          
          SUSFS_KERNEL_PATCH="susfs4ksu/kernel_patches/50_add_susfs_in_gki-android13-5.15.patch"
          
          echo "Applying SUSFS kernel patch..."
          if patch -p1 < "$SUSFS_KERNEL_PATCH"; then
            echo "SUSFS patch successfully applied"
          else
            echo "⚠️ SUSFS patch failed — copying files manually"
          fi

          echo "Applying SUSFS -> KernelSU patch..."
          KSU_PATCH="susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch"
          
          echo "Forcing SUSFS source injection..."
          
          # Always replace fs/susfs.c
          mkdir -p fs
          cp -f susfs4ksu/kernel_patches/fs/susfs.c fs/susfs.c
          echo "Copied fs/susfs.c"
          
          # Always replace include/linux/susfs.h
          mkdir -p include/linux
          cp -f susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/susfs.h
          echo "Copied include/linux/susfs.h"
          
          # Also install missing susfs_def.h
          if [ -f susfs4ksu/kernel_patches/include/linux/susfs_def.h ]; then
            cp -f susfs4ksu/kernel_patches/include/linux/susfs_def.h include/linux/susfs_def.h
            echo "Copied include/linux/susfs_def.h"
          else
            echo "⚠️ susfs_def.h not found in repo"
          fi
          
          echo "Verifying SUSFS files..."
          for f in fs/susfs.c include/linux/susfs.h include/linux/susfs_def.h; do
            if [ -f "$f" ]; then echo "Found: $f"; else echo "Missing: $f"; fi
          done
          
          # Clean up SUSFS repo (we only needed kernel patches, not KSU integration)
          rm -rf susfs4ksu
          
          # Add KSU configs
          CONFIG_FILE="arch/arm64/configs/gki_defconfig"
          cat >> "$CONFIG_FILE" << 'EOF'
          CONFIG_KSU=y
          CONFIG_KSU_MANUAL_HOOK=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_SU=n
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          EOF
          

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16

      - name: Build the kernel
        run: |
          cd kernel
          chmod +x scripts/build.sh
          ./scripts/build.sh 2>&1 | tee "$GITHUB_WORKSPACE/build.log"


      - name: Package image with AnyKernel3
        id: package
        run: |
          set -euxo pipefail
          unzip "${GITHUB_WORKSPACE}/anykernel.zip" -d anykernel/
          cp kernel/out/arch/arm64/boot/Image.gz anykernel/
          # Build final name
          ZIP_NAME="common-5.15.${KERNEL_VERSION}-3d64R-wildksu${WILDKSU_VERSION}-${WILDKSU_VER_CODE}_manual-$(date +%d%m%y-%H%M%S)"
          cd anykernel
          zip -r0 ../"${ZIP_NAME}".zip ./*
          echo "zip_path=$GITHUB_WORKSPACE/${ZIP_NAME}.zip" >> "$GITHUB_OUTPUT"
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          cd ..

      - name: Upload the flashable kernel
        uses: actions/upload-artifact@v4
        with:
          name: ${{steps.package.outputs.zip_name}}
          path: anykernel/
      
      - name: Create GitHub Release and upload asset
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wildksu_build-${{ github.run_id }} 
          target_commitish: ${{ github.sha }}
          name: "Wild KSU Kernel Build by ${{ github.repository }}"
          generate_release_notes: true
          files: ${{ steps.package.outputs.zip_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   
